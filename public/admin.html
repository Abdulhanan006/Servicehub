<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | ServiceHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar" style="position: relative;">
    <div class="container" style="max-width: 100%;">
      <a href="/" class="logo">ServiceHub Admin.</a>
      <div id="adminNavRight" style="display: none;">
        <button id="logoutBtn" class="btn btn-outline" style="padding: 0.5rem 1rem;">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Login Section -->
  <div id="loginSection" class="container">
    <div class="login-wrapper">
      <h2 class="login-title">Admin Login</h2>
      <div id="loginError" class="error-message" style="display: none;"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>
    </div>
  </div>

  <!-- Dashboard Section -->
  <div id="dashboardSection" class="admin-container" style="display: none;">
    <aside class="admin-sidebar">
      <ul class="sidebar-menu">
        <li><a href="#" class="active"><i class="fas fa-list"></i> Manage Services</a></li>
        <li><a href="/" target="_blank"><i class="fas fa-external-link-alt"></i> View Site</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <div class="admin-header">
        <h2>Services Management</h2>
        <button id="openAddModalBtn" class="btn btn-primary"><i class="fas fa-plus" style="margin-right: 0.5rem;"></i> Add Service</button>
      </div>

      <div id="dashboardError" class="error-message" style="display: none;"></div>

      <div class="table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Title</th>
              <th>Category</th>
              <th>Price</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="servicesTableBody">
            <!-- Table rows will be injected here -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Add/Edit Service Modal -->
  <div id="serviceModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Add New Service</h3>
        <button class="close-btn" id="closeModalBtn">&times;</button>
      </div>
      <form id="serviceForm">
        <input type="hidden" id="serviceId">
        
        <div class="form-group">
          <label for="s_title">Title</label>
          <input type="text" id="s_title" class="form-control" required>
        </div>

        <div class="form-group">
          <label for="s_category">Category</label>
          <select id="s_category" class="form-control" required>
            <option value="Web">Web</option>
            <option value="AI">AI</option>
            <option value="Mobile">Mobile</option>
            <option value="UI/UX">UI/UX</option>
            <option value="Marketing">Marketing</option>
            <option value="Consulting">Consulting</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="s_price">Price ($)</label>
          <input type="number" id="s_price" class="form-control" min="0" value="0">
        </div>

        <div class="form-group">
          <label for="s_status">Status</label>
          <select id="s_status" class="form-control">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>

        <div class="form-group">
          <label for="s_short_desc">Short Description</label>
          <input type="text" id="s_short_desc" class="form-control" required maxlength="200">
        </div>

        <div class="form-group">
          <label for="s_full_desc">Full Description</label>
          <textarea id="s_full_desc" class="form-control" required></textarea>
        </div>

        <div class="form-group">
          <label for="s_image">Image</label>
          <input type="file" id="s_image" class="form-control" accept="image/*">
          <div id="currentImageInfo" style="margin-top: 0.5rem; font-size: 0.875rem; color: var(--text-muted);"></div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Save Service</button>
      </form>
    </div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
